<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODETANTRA ANSWER KEYS - Document Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #12182b;
            --bg-card: #1a2137;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #2d3548;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1), transparent 70%);
            pointer-events: none;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 5px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        /* Buttons */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
        }

        .btn-danger {
            background: var(--accent-danger);
            color: white;
        }

        .btn-success {
            background: var(--accent-success);
            color: white;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.85em;
        }

        /* Owner Controls */
        .owner-controls {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .owner-controls.active {
            display: block;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .control-header h3 {
            color: var(--accent-primary);
            font-size: 1.3em;
        }

        .folder-input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
        }

        .upload-area:hover {
            border-color: var(--accent-primary);
            background: var(--bg-card);
        }

        .upload-area.dragover {
            border-color: var(--accent-success);
            background: rgba(16, 185, 129, 0.1);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
        }

        /* Breadcrumb Navigation */
        .breadcrumb {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        .breadcrumb-item:hover {
            color: var(--accent-primary);
        }

        .breadcrumb-item.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .breadcrumb-separator {
            color: var(--border-color);
        }

        /* File Grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-card, .folder-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-card:hover, .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
            border-color: var(--accent-primary);
        }

        .folder-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        }

        .folder-icon, .file-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
        }

        .folder-icon {
            color: var(--accent-secondary);
        }

        .file-icon {
            color: var(--accent-danger);
        }

        .file-name, .folder-name {
            font-weight: 600;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .file-meta {
            font-size: 0.85em;
            color: var(--text-secondary);
            font-family: 'Fira Code', monospace;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .file-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85em;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }

        .toast.success {
            border-left: 4px solid var(--accent-success);
        }

        .toast.error {
            border-left: 4px solid var(--accent-danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--accent-primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 5em;
            opacity: 0.3;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .owner-toggle {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .owner-badge {
            background: linear-gradient(135deg, var(--accent-success), #059669);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .file-grid {
                grid-template-columns: 1fr;
            }

            .folder-input-group {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>📚 CODETANTRA ANSWER KEYS</h1>
                    <div class="subtitle">Your Document Library</div>
                </div>
                </div>
        </header>

        <!-- Hidden file input for uploads -->
        <input type="file" id="pdfUpload" accept=".pdf" multiple onchange="handleFileSelect(event)" style="display:none;">

        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active" onclick="navigateTo([])">🏠 Home</span>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading documents...</p>
        </div>

        <!-- File Grid -->
        <div id="fileGrid" class="file-grid hidden"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">📭</div>
            <h3>No documents here</h3>
            <p>This folder is empty</p>
        </div>
    </div>


    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚠️ Confirm Delete</h3>
                <button class="close-modal" onclick="closeDeleteModal()">×</button>
            </div>
            <p>Are you sure you want to delete this item? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ========== CONFIGURATION ==========
        const SUPABASE_URL = 'https://zzgqpgdfanyviabhzypk.supabase.co/';
        const SUPABASE_ANON_KEY = 'sb_publishable_R_qrpmmg_Sww2MT1fE4TLw_Hoksy20R';

        // Initialize Supabase
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== STATE ==========
        let isOwner = false;
        let currentPath = [];
        let uploadTargetPath = []; // separate from browse path
        let selectedFiles = [];
        let itemToDelete = null;

        // ========== INITIALIZATION ==========
        const SECRET_EDIT_KEY = 'dharani';

        function init() {
            // Check secret URL param INSIDE init so DOM is fully ready
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('edit') === SECRET_EDIT_KEY) {
                isOwner = true;
                // Wipe the param from URL bar so no one sees it
                history.replaceState({}, document.title, window.location.pathname);
            }

            if (isOwner) {
                showToast('✏️ Edit mode active — navigate into a folder and click Add PDF', 'success');
            }

            loadFiles();
        }


        // ========== FILE OPERATIONS ==========
        async function loadFiles() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('fileGrid').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const folderPath = currentPath.length > 0 ? currentPath.join('/') + '/' : '';
                
                const { data, error } = await db.storage
                    .from('pdfs')
                    .list(folderPath, {
                        limit: 100,
                        offset: 0,
                        sortBy: { column: 'name', order: 'asc' }
                    });

                if (error) throw error;

                document.getElementById('loadingState').classList.add('hidden');

                if (data.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    renderFiles(data);
                    document.getElementById('fileGrid').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading files:', error);
                showToast('Error loading files: ' + error.message, 'error');
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function renderFiles(items) {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '';

            // Filter out .keep placeholder files
            items = items.filter(item => item.name !== '.keep');

            if (items.length === 0) {
                document.getElementById('fileGrid').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            // If in edit mode, add a "+ Add PDF here" card at the end
            items.forEach(item => {
                const card = document.createElement('div');

                if (item.id === null) {
                    // Folder card
                    card.className = 'folder-card';
                    card.innerHTML = `
                        <span class="folder-icon">📁</span>
                        <div class="folder-name">${item.name}</div>
                        <div class="file-meta">Folder</div>
                        ${isOwner ? `
                            <div class="file-actions" style="flex-wrap:wrap;gap:6px;">
                                <button class="btn-primary btn-small" style="flex:1;min-width:90px;" onclick="event.stopPropagation(); enterFolderForUpload('${item.name}')">➕ Add PDF</button>
                                <button class="btn-secondary btn-small" style="flex:1;min-width:90px;" onclick="event.stopPropagation(); enterFolderForSubfolder('${item.name}')">📁 Add Folder</button>
                                <button class="btn-danger btn-small" style="width:100%;" onclick="event.stopPropagation(); deleteItem('${item.name}', true)">🗑 Delete Folder</button>
                            </div>
                        ` : ''}
                    `;
                    card.onclick = () => navigateToFolder(item.name);
                } else {
                    // File card
                    card.className = 'file-card';
                    const fileSize = formatFileSize(item.metadata?.size || 0);
                    const fileName = item.name;
                    card.innerHTML = `
                        <span class="file-icon">📄</span>
                        <div class="file-name">${fileName}</div>
                        <div class="file-meta">${fileSize}</div>
                        <div class="file-actions">
                            <button class="btn-primary btn-small" onclick="event.stopPropagation(); viewPDF('${fileName}')">👁 View PDF</button>
                            ${isOwner ? `
                                <button class="btn-danger btn-small" onclick="event.stopPropagation(); deleteItem('${fileName}', false)">🗑 Delete</button>
                            ` : ''}
                        </div>
                    `;
                }

                grid.appendChild(card);
            });

            // In edit mode, always show an "+ Upload PDF here" card at the end
            if (isOwner) {
                const addCard = document.createElement('div');
                addCard.className = 'file-card';
                addCard.style.cssText = 'border:2px dashed var(--accent-primary);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;min-height:160px;opacity:0.75;transition:opacity 0.2s;';
                addCard.onmouseenter = () => addCard.style.opacity = '1';
                addCard.onmouseleave = () => addCard.style.opacity = '0.75';
                addCard.innerHTML = `<div style="font-size:2.5em;margin-bottom:10px;">➕</div><div style="font-weight:600;color:var(--accent-primary);">Upload PDF here</div><div style="font-size:0.82em;color:var(--text-secondary);margin-top:4px;">Click to select files</div>`;
                addCard.onclick = () => {
                    updateUploadDest(currentPath);
                    document.getElementById('pdfUpload').click();
                        };
                grid.appendChild(addCard);
            }
        }

        function navigateToFolder(folderName) {
            currentPath.push(folderName);
            if (isOwner) updateUploadDest(currentPath);
            updateBreadcrumb();
            loadFiles();
        }

        function navigateTo(path) {
            currentPath = path;
            if (isOwner) updateUploadDest(currentPath);
            updateBreadcrumb();
            loadFiles();
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="navigateTo([])">🏠 Home</span>';
            
            currentPath.forEach((folder, index) => {
                const path = currentPath.slice(0, index + 1);
                html += `
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-item ${index === currentPath.length - 1 ? 'active' : ''}" 
                          onclick='navigateTo(${JSON.stringify(path)})'>${folder}</span>
                `;
            });
            
            breadcrumb.innerHTML = html;
        }

        function viewPDF(fileName) {
            const filePath = currentPath.length > 0 
                ? currentPath.join('/') + '/' + fileName 
                : fileName;
            
            // Use public URL directly - no signing needed for public bucket
            const { data } = db.storage
                .from('pdfs')
                .getPublicUrl(filePath);

            window.open(data.publicUrl, '_blank');
        }

        // ========== UPLOAD OPERATIONS ==========
        function handleFileSelect(event) {
            selectedFiles = Array.from(event.target.files);
            if (selectedFiles.length > 0) {
                const names = selectedFiles.map(f => f.name).join(', ');
                showToast(`📎 ${selectedFiles.length} file(s) selected`, 'success');
            }
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            
            const files = Array.from(event.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length > 0) {
                selectedFiles = files;
                showToast(`${files.length} PDF(s) ready to upload`, 'success');
            } else {
                showToast('Please drop PDF files only', 'error');
            }
        }

        async function uploadPDFs() {
            if (!isOwner) {
                showToast('Edit mode not active. Use the edit URL.', 'error');
                return;
            }
            if (selectedFiles.length === 0) {
                showToast('Please select files to upload', 'error');
                return;
            }
            if (uploadTargetPath.length === 0) {
                showToast('Please navigate into a folder first, or click "Add PDF" on a folder card', 'error');
                return;
            }

            const folderPath = uploadTargetPath.join('/');

            try {
                for (const file of selectedFiles) {
                    const filePath = `${folderPath}/${file.name}`;
                    const { error } = await db.storage.from('pdfs').upload(filePath, file, { cacheControl: '3600', upsert: true });
                    if (error) throw error;
                }
                showToast(`✅ ${selectedFiles.length} file(s) uploaded!`, 'success');
                selectedFiles = [];
                document.getElementById('pdfUpload').value = '';

                // Navigate to where we just uploaded
                currentPath = [...uploadTargetPath];
                updateBreadcrumb();
                loadFiles();
            } catch (error) {
                showToast('Upload error: ' + error.message, 'error');
            }
        }

        function showInlineFolderInput() {
            const name = prompt('New folder name:');
            if (name && name.trim()) {
                createFolderWithName(name.trim());
            }
        }

        async function createFolderWithName(name) {
            const basePath = uploadTargetPath.length > 0 ? uploadTargetPath.join('/') + '/' : '';
            const folderPath = `${basePath}${name}/.keep`;
            try {
                const { error } = await db.storage.from('pdfs').upload(folderPath, new Blob([''], { type: 'text/plain' }), { cacheControl: '3600', upsert: false });
                if (error && !error.message.includes('already exists')) throw error;
                showToast(`📁 "${name}" created!`, 'success');
                loadFiles();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        function updateUploadDest(path) {
            uploadTargetPath = [...path];
        }

        function enterFolderForUpload(folderName) {
            const path = [...currentPath, folderName];
            updateUploadDest(path);
            document.getElementById('pdfUpload').click();
        }

        function enterFolderForSubfolder(folderName) {
            const path = [...currentPath, folderName];
            updateUploadDest(path);
            showInlineFolderInput();
        }

        async function createFolder() {
            // Legacy — now handled by createFolderInline
            showInlineFolderInput();
        }

        // ========== DELETE OPERATIONS ==========
        function deleteItem(name, isFolder) {
            if (!isOwner) {
                showToast('Edit mode not active. Use the edit URL.', 'error');
                return;
            }

            itemToDelete = { name, isFolder };
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            itemToDelete = null;
        }

        async function confirmDelete() {
            if (!itemToDelete) return;

            const filePath = currentPath.length > 0 
                ? currentPath.join('/') + '/' + itemToDelete.name
                : itemToDelete.name;

            try {
                if (itemToDelete.isFolder) {
                    const { data: files, error: listError } = await db.storage
                        .from('pdfs')
                        .list(filePath);

                    if (listError) throw listError;

                    const filesToDelete = files.map(f => `${filePath}/${f.name}`);
                    
                    if (filesToDelete.length > 0) {
                        const { error: deleteError } = await db.storage
                            .from('pdfs')
                            .remove(filesToDelete);

                        if (deleteError) throw deleteError;
                    }
                } else {
                    const { error } = await db.storage
                        .from('pdfs')
                        .remove([filePath]);

                    if (error) throw error;
                }

                showToast('Deleted successfully!', 'success');
                closeDeleteModal();
                loadFiles();
            } catch (error) {
                showToast('Delete error: ' + error.message, 'error');
                closeDeleteModal();
            }
        }

        // ========== UTILITIES ==========
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize
        init();
    </script>
</body>
</html>
