<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODETANTRA ANSWER KEYS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #020c02;
            --bg-secondary: #041204;
            --bg-card: #071a07;
            --bg-card2: #0a1f0a;
            --accent-primary: #00ff41;
            --accent-secondary: #00cc33;
            --accent-dim: #00802a;
            --accent-danger: #ff3333;
            --accent-warn: #ffaa00;
            --text-primary: #e0ffe0;
            --text-secondary: #5aff7a;
            --text-dim: #2a7a3a;
            --border-color: #0d3d0d;
            --border-glow: #00ff4144;
            --glow: 0 0 10px #00ff4133, 0 0 30px #00ff4111;
            --glow-strong: 0 0 8px #00ff41, 0 0 20px #00ff4166;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,65,0.015) 2px,
                rgba(0,255,65,0.015) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Grid bg */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0,255,65,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,65,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            padding: 28px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            border-top: 2px solid var(--accent-primary);
            box-shadow: var(--glow), inset 0 1px 0 rgba(0,255,65,0.1);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -60%; right: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,255,65,0.07), transparent 70%);
            pointer-events: none;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .logo-area { display: flex; align-items: center; gap: 14px; }

        .logo-icon {
            font-size: 2.4em;
            filter: drop-shadow(0 0 8px var(--accent-primary));
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2em;
            font-weight: 400;
            color: var(--accent-primary);
            text-shadow: var(--glow-strong);
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-badge {
            display: flex; align-items: center; gap: 10px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: var(--glow-strong);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78em;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* ── BREADCRUMB ── */
        .breadcrumb {
            background: var(--bg-secondary);
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.88em;
        }

        .breadcrumb-item {
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .breadcrumb-item:hover { color: var(--accent-primary); background: rgba(0,255,65,0.07); }
        .breadcrumb-item.active { color: var(--accent-primary); text-shadow: 0 0 6px var(--accent-primary); }
        .breadcrumb-separator { color: var(--text-dim); }

        /* ── EDIT MODE BAR ── */
        #editBar {
            display: none;
            background: rgba(0,255,65,0.06);
            border: 1px solid var(--accent-dim);
            border-left: 3px solid var(--accent-primary);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82em;
        }

        #editBar.active { display: flex; }

        .edit-bar-label { color: var(--accent-primary); letter-spacing: 1px; }

        .edit-bar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── BUTTONS ── */
        button {
            padding: 9px 18px;
            border: none;
            border-radius: 7px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.88em;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: rgba(0,255,65,0.12);
            color: var(--accent-primary);
            border: 1px solid var(--accent-dim);
        }
        .btn-primary:hover {
            background: rgba(0,255,65,0.22);
            box-shadow: var(--glow);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-card2);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: var(--bg-card); color: var(--accent-primary); border-color: var(--accent-dim); }

        .btn-danger {
            background: rgba(255,51,51,0.12);
            color: var(--accent-danger);
            border: 1px solid rgba(255,51,51,0.3);
        }
        .btn-danger:hover { background: rgba(255,51,51,0.22); box-shadow: 0 0 10px rgba(255,51,51,0.3); }

        .btn-warn {
            background: rgba(255,170,0,0.12);
            color: var(--accent-warn);
            border: 1px solid rgba(255,170,0,0.3);
        }
        .btn-warn:hover { background: rgba(255,170,0,0.22); }

        .btn-small { padding: 6px 12px; font-size: 0.8em; }

        /* ── FILE GRID ── */
        .file-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .file-card, .folder-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .file-card::before, .folder-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .file-card:hover, .folder-card:hover {
            border-color: var(--accent-dim);
            box-shadow: var(--glow);
            transform: translateY(-3px);
        }

        .file-card:hover::before, .folder-card:hover::before { opacity: 1; }

        .folder-card { background: linear-gradient(135deg, var(--bg-card), var(--bg-card2)); }

        .folder-icon {
            font-size: 2.8em;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 6px rgba(0,255,65,0.4));
        }

        .file-icon {
            font-size: 2.8em;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 4px rgba(255,51,51,0.4));
        }

        .folder-name, .file-name {
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
            font-size: 0.95em;
            color: var(--text-primary);
        }

        .file-meta {
            font-size: 0.78em;
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 12px;
        }

        .file-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        /* ── ADD CARDS ── */
        .add-pdf-card {
            border: 2px dashed var(--accent-dim);
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-height: 150px;
            border-radius: 10px;
            transition: all 0.25s;
            opacity: 0.6;
        }
        .add-pdf-card:hover { opacity: 1; border-color: var(--accent-primary); box-shadow: var(--glow); }
        .add-pdf-card .plus { font-size: 2.2em; color: var(--accent-primary); margin-bottom: 8px; text-shadow: var(--glow-strong); }
        .add-pdf-card .label { font-size: 0.85em; color: var(--accent-primary); font-weight: 600; font-family: 'Share Tech Mono', monospace; }
        .add-pdf-card .sublabel { font-size: 0.72em; color: var(--text-dim); margin-top: 4px; font-family: 'Share Tech Mono', monospace; }

        .add-folder-card {
            border: 2px dashed var(--accent-dim);
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-height: 150px;
            border-radius: 10px;
            transition: all 0.25s;
            opacity: 0.6;
        }
        .add-folder-card:hover { opacity: 1; border-color: var(--accent-secondary); box-shadow: 0 0 10px rgba(0,204,51,0.3); }
        .add-folder-card .plus { font-size: 2.2em; color: var(--accent-secondary); margin-bottom: 8px; }
        .add-folder-card .label { font-size: 0.85em; color: var(--accent-secondary); font-weight: 600; font-family: 'Share Tech Mono', monospace; }
        .add-folder-card .sublabel { font-size: 0.72em; color: var(--text-dim); margin-top: 4px; font-family: 'Share Tech Mono', monospace; }

        /* ── LOADING ── */
        .loading { text-align: center; padding: 60px 20px; }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 44px; height: 44px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
            box-shadow: var(--glow);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { font-family: 'Share Tech Mono', monospace; color: var(--text-secondary); font-size: 0.88em; letter-spacing: 2px; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 4em; opacity: 0.2; margin-bottom: 16px; }
        .empty-state h3 { color: var(--text-dim); margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; font-weight: 400; letter-spacing: 1px; }
        .empty-state p { color: var(--text-dim); font-size: 0.85em; font-family: 'Share Tech Mono', monospace; }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            padding: 28px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            border-top: 2px solid var(--accent-primary);
            max-width: 460px; width: 90%;
            box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.7);
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--accent-primary);
            font-family: 'Share Tech Mono', monospace;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1.05em;
        }

        .close-modal {
            background: none; border: none;
            font-size: 1.4em; cursor: pointer;
            color: var(--text-dim); padding: 0;
            width: 28px; height: 28px;
            transition: color 0.2s;
        }
        .close-modal:hover { color: var(--accent-danger); }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95em;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 2px rgba(0,255,65,0.1);
        }
        label {
            display: block;
            margin-bottom: 7px;
            color: var(--text-dim);
            font-size: 0.82em;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
        }
        .input-group { margin-bottom: 16px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: var(--bg-card2);
            padding: 13px 22px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 340px;
            font-size: 0.88em;
            font-family: 'Share Tech Mono', monospace;
        }
        .toast.success { border-left: 3px solid var(--accent-primary); color: var(--accent-primary); }
        .toast.error { border-left: 3px solid var(--accent-danger); color: var(--accent-danger); }

        @keyframes slideIn {
            from { transform: translateX(380px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ── OWNER BADGE ── */
        .owner-badge {
            background: rgba(0,255,65,0.1);
            border: 1px solid var(--accent-dim);
            color: var(--accent-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78em;
            letter-spacing: 1px;
            box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            h1 { font-size: 1.4em; }
            .file-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .file-grid { grid-template-columns: 1fr; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <header>
        <div class="header-content">
            <div class="logo-area">
                <span class="logo-icon">💾</span>
                <div>
                    <h1>CODETANTRA ANSWER KEYS</h1>
                    <div class="subtitle">> ANSWER FOR ALL QUESTION_</div>
                </div>
            </div>
            <div class="header-badge">
                <div class="status-dot"></div>
                <span class="status-text">SYSTEM ONLINE</span>
                <span id="ownerBadge" class="owner-badge hidden">✦ EDIT MODE</span>
            </div>
        </div>
    </header>

    <!-- HIDDEN FILE INPUT -->
    <input type="file" id="pdfUpload" accept=".pdf" multiple onchange="handleFileSelect(event)" style="display:none;">

    <!-- EDIT MODE BAR -->
    <div id="editBar">
        <span class="edit-bar-label">▶ EDIT MODE ACTIVE — <span id="editDestLabel" style="color:var(--text-secondary);">navigating root</span></span>
        <div class="edit-bar-actions">
            <button class="btn-primary btn-small" onclick="triggerUploadHere()">⬆ Upload PDF Here</button>
            <button class="btn-secondary btn-small" onclick="promptNewFolder()">📁 New Folder Here</button>
        </div>
    </div>

    <!-- BREADCRUMB -->
    <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item active" onclick="navigateTo([])">⌂ ROOT</span>
    </div>

    <!-- LOADING -->
    <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p>LOADING DOCUMENTS...</p>
    </div>

    <!-- FILE GRID -->
    <div id="fileGrid" class="file-grid hidden"></div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📭</div>
        <h3>// EMPTY DIRECTORY</h3>
        <p>no files found in this path</p>
    </div>

</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>⚠ CONFIRM DELETE</h3>
            <button class="close-modal" onclick="closeDeleteModal()">×</button>
        </div>
        <p style="color:var(--text-secondary);font-size:0.9em;font-family:'Share Tech Mono',monospace;">This action cannot be undone. Permanently delete <strong id="deleteItemName" style="color:var(--accent-danger);"></strong>?</p>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- RENAME MODAL -->
<div id="renameModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>✎ RENAME</h3>
            <button class="close-modal" onclick="closeRenameModal()">×</button>
        </div>
        <div class="input-group">
            <label>NEW NAME</label>
            <input type="text" id="renameInput" placeholder="Enter new name" onkeydown="if(event.key==='Enter') confirmRename()">
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeRenameModal()">Cancel</button>
            <button class="btn-primary" onclick="confirmRename()">Rename</button>
        </div>
    </div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ── CONFIG ──
    const SUPABASE_URL = 'https://zzgqpgdfanyviabhzypk.supabase.co/';
    const SUPABASE_ANON_KEY = 'sb_publishable_R_qrpmmg_Sww2MT1fE4TLw_Hoksy20R';
    const SECRET_EDIT_KEY = 'dharani';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── STATE ──
    let isOwner = false;
    let currentPath = [];
    let uploadTargetPath = [];
    let selectedFiles = [];
    let itemToDelete = null;
    let itemToRename = null;

    // ── INIT ──
    function init() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('edit') === SECRET_EDIT_KEY) {
            isOwner = true;
            history.replaceState({}, document.title, window.location.pathname);
        }
        if (isOwner) {
            document.getElementById('ownerBadge').classList.remove('hidden');
            document.getElementById('editBar').classList.add('active');
            updateEditBarLabel();
        }
        loadFiles();
    }

    function updateEditBarLabel() {
        const label = currentPath.length > 0 ? currentPath.join(' / ') : 'root';
        document.getElementById('editDestLabel').textContent = label;
        uploadTargetPath = [...currentPath];
    }

    // ── LOAD FILES ──
    async function loadFiles() {
        document.getElementById('loadingState').classList.remove('hidden');
        document.getElementById('fileGrid').classList.add('hidden');
        document.getElementById('emptyState').classList.add('hidden');

        try {
            const folderPath = currentPath.length > 0 ? currentPath.join('/') + '/' : '';
            const { data, error } = await db.storage.from('pdfs').list(folderPath, {
                limit: 200, offset: 0, sortBy: { column: 'name', order: 'asc' }
            });
            if (error) throw error;

            document.getElementById('loadingState').classList.add('hidden');
            const filtered = data.filter(i => i.name !== '.keep');

            if (filtered.length === 0 && !isOwner) {
                document.getElementById('emptyState').classList.remove('hidden');
            } else {
                renderFiles(filtered);
                document.getElementById('fileGrid').classList.remove('hidden');
            }
        } catch (error) {
            document.getElementById('loadingState').innerHTML = `
                <div style="background:var(--bg-card);border:1px solid rgba(255,51,51,0.4);border-left:3px solid var(--accent-danger);border-radius:10px;padding:24px;max-width:480px;margin:0 auto;text-align:left;">
                    <div style="font-size:1.5em;margin-bottom:8px;color:var(--accent-danger);">⚠ CONNECTION ERROR</div>
                    <p style="color:var(--accent-danger);font-family:'Share Tech Mono',monospace;font-size:0.85em;margin-bottom:12px;">${error.message}</p>
                    <p style="color:var(--text-dim);font-size:0.82em;font-family:'Share Tech Mono',monospace;">Check Supabase URL/key and bucket policies.</p>
                    <button onclick="location.reload()" style="margin-top:14px;padding:8px 18px;background:rgba(255,51,51,0.1);color:var(--accent-danger);border:1px solid rgba(255,51,51,0.3);border-radius:6px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.82em;">↺ RETRY</button>
                </div>`;
        }
    }

    // ── RENDER ──
    function renderFiles(items) {
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = '';
    
        items.forEach((item, index) => {
            const card = document.createElement('div');
    
            if (item.id === null) {
                // 📁 FOLDER
                card.className = 'folder-card';
    
                /* 🔥 AUTO POSITION SYSTEM */
                if (item.name.startsWith("SEM-")) {
                    const num = parseInt(item.name.split("-")[1]);
                    card.style.order = num;  // SEM-1 → 1, SEM-2 → 2
                } else {
                    card.style.order = 100 + index; // other folders later
                }
    
                card.innerHTML = `
                    <span class="folder-icon">📁</span>
                    <div class="folder-name">${item.name}</div>
                    <div class="file-meta">FOLDER</div>
                    ${isOwner ? `
                    <div class="file-actions">
                        <button class="btn-primary btn-small" onclick="event.stopPropagation();enterFolderForUpload('${item.name}')">⬆ PDF</button>
                        <button class="btn-secondary btn-small" onclick="event.stopPropagation();enterFolderForSubfolder('${item.name}')">📁+</button>
                        <button class="btn-warn btn-small" onclick="event.stopPropagation();openRename('${item.name}',true)">✎</button>
                        <button class="btn-danger btn-small" onclick="event.stopPropagation();deleteItem('${item.name}',true)">🗑</button>
                    </div>` : ''}
                `;
    
                card.onclick = () => navigateToFolder(item.name);
    
            } else {
                // 📄 FILE
                card.className = 'file-card';
                card.style.order = 1000 + index;
    
                const size = formatFileSize(item.metadata?.size || 0);
    
                card.innerHTML = `
                    <span class="file-icon">📄</span>
                    <div class="file-name">${item.name}</div>
                    <div class="file-meta">${size}</div>
                    <div class="file-actions">
                        <button class="btn-primary btn-small" onclick="event.stopPropagation();viewPDF('${item.name}')">▶ VIEW</button>
                        ${isOwner ? `
                        <button class="btn-warn btn-small" onclick="event.stopPropagation();openRename('${item.name}',false)">✎</button>
                        <button class="btn-danger btn-small" onclick="event.stopPropagation();deleteItem('${item.name}',false)">🗑</button>` : ''}
                    </div>
                `;
            }
    
            grid.appendChild(card);
        });
    
        // ➕ ADD BUTTONS (keep at end)
        if (isOwner) {
            const addPDF = document.createElement('div');
            addPDF.className = 'add-pdf-card';
            addPDF.style.order = 9999;
            addPDF.innerHTML = `<div class="plus">⬆</div><div class="label">UPLOAD PDF HERE</div>`;
            addPDF.onclick = () => triggerUploadHere();
            grid.appendChild(addPDF);
    
            const addFolder = document.createElement('div');
            addFolder.className = 'add-folder-card';
            addFolder.style.order = 10000;
            addFolder.innerHTML = `<div class="plus">📁</div><div class="label">NEW FOLDER HERE</div>`;
            addFolder.onclick = () => promptNewFolder();
            grid.appendChild(addFolder);
        }
    }
    // ── NAVIGATION ──
    function navigateToFolder(name) {
        currentPath.push(name);
        if (isOwner) updateEditBarLabel();
        updateBreadcrumb();
        loadFiles();
    }

    function navigateTo(path) {
        currentPath = path;
        if (isOwner) updateEditBarLabel();
        updateBreadcrumb();
        loadFiles();
    }

    function updateBreadcrumb() {
        const bc = document.getElementById('breadcrumb');
        let html = `<span class="breadcrumb-item" onclick="navigateTo([])">⌂ ROOT</span>`;
        currentPath.forEach((f, i) => {
            const p = currentPath.slice(0, i + 1);
            html += `<span class="breadcrumb-separator">/</span>
                     <span class="breadcrumb-item ${i === currentPath.length-1 ? 'active' : ''}"
                           onclick='navigateTo(${JSON.stringify(p)})'>${f}</span>`;
        });
        bc.innerHTML = html;
    }

    // ── VIEW PDF ──
    function viewPDF(fileName) {
        const filePath = currentPath.length > 0 ? currentPath.join('/') + '/' + fileName : fileName;
        const { data } = db.storage.from('pdfs').getPublicUrl(filePath);
        window.open(data.publicUrl, '_blank');
    }

    // ── UPLOAD ──
    function triggerUploadHere() {
        uploadTargetPath = [...currentPath];
        updateEditBarLabel();
        document.getElementById('pdfUpload').click();
    }

    function enterFolderForUpload(folderName) {
        uploadTargetPath = [...currentPath, folderName];
        document.getElementById('pdfUpload').click();
    }

    function enterFolderForSubfolder(folderName) {
        uploadTargetPath = [...currentPath, folderName];
        promptNewFolder();
    }

    function handleFileSelect(event) {
        selectedFiles = Array.from(event.target.files);
        if (selectedFiles.length > 0) uploadPDFs();
    }

    function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
    function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
    function handleDrop(e) {
        e.preventDefault(); e.currentTarget.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
        if (files.length > 0) { selectedFiles = files; uploadPDFs(); }
        else showToast('PDF files only', 'error');
    }

    async function uploadPDFs() {
        if (!isOwner) { showToast('Edit mode not active', 'error'); return; }
        if (selectedFiles.length === 0) { showToast('No files selected', 'error'); return; }
        if (uploadTargetPath.length === 0) { showToast('Navigate into a folder first or click ⬆ PDF on a folder', 'error'); return; }

        showToast(`Uploading ${selectedFiles.length} file(s)...`, 'success');
        const folderPath = uploadTargetPath.join('/');
        try {
            for (const file of selectedFiles) {
                const { error } = await db.storage.from('pdfs').upload(`${folderPath}/${file.name}`, file, { cacheControl: '3600', upsert: true });
                if (error) throw error;
            }
            showToast(`✅ ${selectedFiles.length} file(s) uploaded!`, 'success');
            selectedFiles = [];
            document.getElementById('pdfUpload').value = '';
            currentPath = [...uploadTargetPath];
            updateBreadcrumb();
            if (isOwner) updateEditBarLabel();
            loadFiles();
        } catch (e) { showToast('Upload error: ' + e.message, 'error'); }
    }

    // ── NEW FOLDER ──
    function promptNewFolder() {
        const name = prompt(`New folder name inside "${currentPath.length > 0 ? currentPath.join('/') : 'ROOT'}":`);
        if (name && name.trim()) createFolderWithName(name.trim());
    }

    async function createFolderWithName(name) {
        const base = uploadTargetPath.length > 0 ? uploadTargetPath.join('/') + '/' : (currentPath.length > 0 ? currentPath.join('/') + '/' : '');
        const path = `${base}${name}/.keep`;
        try {
            const { error } = await db.storage.from('pdfs').upload(path, new Blob([''], { type: 'text/plain' }), { cacheControl: '3600', upsert: false });
            if (error && !error.message.includes('already exists')) throw error;
            showToast(`📁 "${name}" created!`, 'success');
            loadFiles();
        } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    // ── DELETE ──
    function deleteItem(name, isFolder) {
        itemToDelete = { name, isFolder };
        document.getElementById('deleteItemName').textContent = name;
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        itemToDelete = null;
    }

    async function confirmDelete() {
        if (!itemToDelete) return;
        const filePath = currentPath.length > 0 ? currentPath.join('/') + '/' + itemToDelete.name : itemToDelete.name;
        try {
            if (itemToDelete.isFolder) {
                // recursively delete all files in folder
                const { data: files } = await db.storage.from('pdfs').list(filePath);
                if (files && files.length > 0) {
                    await db.storage.from('pdfs').remove(files.map(f => `${filePath}/${f.name}`));
                }
            } else {
                const { error } = await db.storage.from('pdfs').remove([filePath]);
                if (error) throw error;
            }
            showToast('Deleted!', 'success');
            closeDeleteModal();
            loadFiles();
        } catch (e) { showToast('Delete error: ' + e.message, 'error'); closeDeleteModal(); }
    }

    // ── RENAME ──
    function openRename(name, isFolder) {
        itemToRename = { name, isFolder };
        document.getElementById('renameInput').value = isFolder ? name : name.replace(/\.pdf$/i, '');
        document.getElementById('renameModal').classList.add('active');
        setTimeout(() => document.getElementById('renameInput').select(), 100);
    }

    function closeRenameModal() {
        document.getElementById('renameModal').classList.remove('active');
        itemToRename = null;
    }

    async function confirmRename() {
        if (!itemToRename) return;
        let newName = document.getElementById('renameInput').value.trim();
        if (!newName) { showToast('Enter a name', 'error'); return; }

        const oldName = itemToRename.name;
        const isFolder = itemToRename.isFolder;

        // Add .pdf if it's a file and missing extension
        if (!isFolder && !newName.toLowerCase().endsWith('.pdf')) newName += '.pdf';

        const base = currentPath.length > 0 ? currentPath.join('/') + '/' : '';
        const oldPath = base + oldName;
        const newPath = base + newName;

        try {
            if (isFolder) {
                // Rename folder: copy all files then delete originals
                const { data: files } = await db.storage.from('pdfs').list(oldPath);
                if (files && files.length > 0) {
                    for (const f of files) {
                        const { data: dlData } = await db.storage.from('pdfs').download(`${oldPath}/${f.name}`);
                        await db.storage.from('pdfs').upload(`${newPath}/${f.name}`, dlData, { upsert: true });
                    }
                    await db.storage.from('pdfs').remove(files.map(f => `${oldPath}/${f.name}`));
                } else {
                    // Empty folder - just create new keep
                    await db.storage.from('pdfs').upload(`${newPath}/.keep`, new Blob([''], { type: 'text/plain' }), { upsert: false });
                }
            } else {
                // Rename file: copy then delete
                const { data: fileData, error: dlErr } = await db.storage.from('pdfs').download(oldPath);
                if (dlErr) throw dlErr;
                const { error: upErr } = await db.storage.from('pdfs').upload(newPath, fileData, { cacheControl: '3600', upsert: true });
                if (upErr) throw upErr;
                const { error: rmErr } = await db.storage.from('pdfs').remove([oldPath]);
                if (rmErr) throw rmErr;
            }
            showToast(`✅ Renamed to "${newName}"`, 'success');
            closeRenameModal();
            loadFiles();
        } catch (e) { showToast('Rename error: ' + e.message, 'error'); }
    }

    // ── UTILS ──
    function formatFileSize(bytes) {
        if (!bytes) return '0 B';
        const k = 1024, s = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
    }

    function showToast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    init();
</script>
</body>
</html>
