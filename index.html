<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault — Academic Resources</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #080b1a;
            --bg-secondary: #0d1124;
            --bg-card: #111527;
            --bg-hover: #161b32;
            --bg-active: #1a2040;
            --border: #1d2540;
            --border-light: #252d4a;
            --accent: #4ade80;
            --accent-dim: rgba(74,222,128,0.12);
            --accent-glow: rgba(74,222,128,0.25);
            --accent2: #60a5fa;
            --accent2-dim: rgba(96,165,250,0.12);
            --text-primary: #e8eaf6;
            --text-secondary: #8892b0;
            --text-muted: #4a5480;
            --pdf-color: #f97316;
            --folder-color: #60a5fa;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(74,222,128,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,222,128,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── SIDEBAR ─────────────────────────────── */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 240px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow: hidden;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px; height: 36px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-glow);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .logo-text span { color: var(--accent); }

        .sidebar-section {
            padding: 16px 12px 8px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 2px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.18s ease;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
            position: relative;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-glow);
        }

        .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

        .nav-badge {
            margin-left: auto;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .sidebar-spacer { flex: 1; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .storage-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .storage-bar {
            height: 4px;
            background: var(--bg-active);
            border-radius: 2px;
            overflow: hidden;
        }

        .storage-bar-fill {
            height: 100%;
            width: 34%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
        }

        /* ── MAIN LAYOUT ─────────────────────────── */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ── TOP BAR ─────────────────────────────── */
        .topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            width: 34px; height: 34px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.18s;
            flex-shrink: 0;
        }

        .back-btn:hover:not(:disabled) {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            overflow: hidden;
        }

        .breadcrumb-item {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.15s;
            font-family: 'JetBrains Mono', monospace;
        }

        .breadcrumb-item:hover { color: var(--text-primary); }
        .breadcrumb-item.current { color: var(--text-primary); font-weight: 600; }
        .breadcrumb-sep { color: var(--text-muted); font-size: 12px; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 34px; height: 34px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.18s;
        }

        .icon-btn:hover {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-primary);
        }

        .icon-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent-glow);
            color: var(--accent);
        }

        /* Search bar */
        .search-wrap {
            position: relative;
        }

        .search-input-topbar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 7px 12px 7px 32px;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            width: 220px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input-topbar:focus {
            border-color: var(--accent-glow);
            background: var(--bg-hover);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .search-icon-top {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        /* ── CONTENT AREA ────────────────────────── */
        .content-area {
            flex: 1;
            padding: 24px;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s;
        }

        .stat-card:hover { border-color: var(--border-light); }

        .stat-icon {
            width: 38px; height: 38px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stat-icon.green { background: var(--accent-dim); }
        .stat-icon.blue { background: var(--accent2-dim); }
        .stat-icon.orange { background: rgba(249,115,22,0.12); }
        .stat-icon.purple { background: rgba(168,85,247,0.12); }

        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
        .stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* Toolbar row */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .toolbar-right { display: flex; align-items: center; gap: 8px; }

        .view-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .view-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }

        .view-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .sort-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            outline: none;
        }

        /* ── FILE LIST ───────────────────────────── */
        .file-table-header {
            display: grid;
            grid-template-columns: 1fr 100px 120px 80px;
            gap: 8px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .items-list-view { display: flex; flex-direction: column; gap: 3px; }

        .file-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 100px 120px 80px;
            gap: 8px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.18s ease;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .file-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: transparent;
            transition: background 0.18s;
        }

        .file-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
            transform: translateX(2px);
        }

        .file-item:hover::before { background: var(--accent); }

        .file-item.folder-item:hover::before { background: var(--folder-color); }

        .file-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-type-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .file-type-icon.folder { background: var(--accent2-dim); }
        .file-type-icon.pdf { background: rgba(249,115,22,0.12); }

        .file-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-tag {
            font-size: 10px;
            background: var(--bg-active);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .file-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        .file-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .file-item:hover .file-actions { opacity: 1; }

        .file-action-btn {
            width: 28px; height: 28px;
            background: var(--bg-active);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }

        .file-action-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-glow);
        }

        /* Grid view */
        .items-grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .file-item-grid {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        .file-item-grid:hover {
            background: var(--bg-hover);
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .file-item-grid .file-type-icon {
            width: 52px; height: 52px;
            font-size: 26px;
        }

        .file-item-grid .file-name {
            font-size: 13px;
            white-space: normal;
            line-height: 1.3;
            -webkit-line-clamp: 2;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-item-grid .file-meta {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .grid-download-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            padding: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
        }

        .grid-download-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-glow);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
            filter: grayscale(1);
        }

        .empty-title { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-sub { font-size: 13px; }

        /* ── PDF VIEWER ───────────────────────────── */
        .pdf-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 1000;
            flex-direction: column;
        }

        .pdf-overlay.active { display: flex; }

        .pdf-topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .pdf-title-bar {
            flex: 1;
            overflow: hidden;
        }

        .pdf-file-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pdf-file-sub {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .pdf-download-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #071a0e;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all 0.18s;
            flex-shrink: 0;
        }

        .pdf-download-btn:hover {
            background: #22c55e;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .pdf-frame-container {
            flex: 1;
            background: #1a1a1a;
            overflow: hidden;
        }

        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .pdf-no-preview {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: var(--text-muted);
        }

        /* ── LOADER ───────────────────────────────── */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 14px;
            color: var(--text-muted);
        }

        .spin {
            width: 32px; height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MOBILE ───────────────────────────────── */
        .mobile-bottom-nav {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .file-table-header { display: none; }
            .file-item {
                grid-template-columns: 1fr auto;
            }
            .file-size, .file-date { display: none; }

            .search-input-topbar { width: 140px; }

            .mobile-bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--bg-secondary);
                border-top: 1px solid var(--border);
                z-index: 150;
            }

            .mobile-nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 10px 0;
                background: transparent;
                border: none;
                color: var(--text-muted);
                font-size: 10px;
                font-family: 'Space Grotesk', sans-serif;
                cursor: pointer;
                gap: 4px;
                transition: color 0.15s;
            }

            .mobile-nav-item.active { color: var(--accent); }
            .mobile-nav-icon { font-size: 22px; }

            .content-area { padding: 16px; padding-bottom: 80px; }
        }

        /* Animations */
        .file-item, .file-item-grid, .stat-card {
            animation: fadeUp 0.25s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-item:nth-child(1) { animation-delay: 0ms; }
        .file-item:nth-child(2) { animation-delay: 30ms; }
        .file-item:nth-child(3) { animation-delay: 60ms; }
        .file-item:nth-child(4) { animation-delay: 90ms; }
        .file-item:nth-child(5) { animation-delay: 120ms; }
        .file-item:nth-child(6) { animation-delay: 150ms; }
        .file-item:nth-child(n+7) { animation-delay: 180ms; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────────────────────── -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <a class="logo-mark" href="#">
            <div class="logo-icon">📚</div>
            <span class="logo-text">Study<span>Vault</span></span>
        </a>
    </div>

    <div class="sidebar-section">Navigation</div>
    <div class="nav-item active" onclick="navigateHome()">
        <span class="nav-icon">🏠</span> Home
        <span class="nav-badge" id="sidebarTotalCount">—</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">⭐</span> Starred
    </div>
    <div class="nav-item">
        <span class="nav-icon">🕓</span> Recent
    </div>
    <div class="nav-item">
        <span class="nav-icon">🗑</span> Trash
    </div>

    <div class="sidebar-section">Semesters</div>
    <div id="sidebarSemList"></div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
        <div class="storage-bar-label">
            <span>Storage used</span>
            <span style="color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">34%</span>
        </div>
        <div class="storage-bar">
            <div class="storage-bar-fill"></div>
        </div>
    </div>
</aside>

<!-- ── MAIN ────────────────────────────────────────────── -->
<main class="main">

    <!-- Top Bar -->
    <div class="topbar">
        <button class="back-btn" id="backBtn" disabled title="Go back">←</button>

        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item current">MAIN</span>
        </div>

        <div class="topbar-right">
            <div class="search-wrap">
                <span class="search-icon-top">🔍</span>
                <input type="text" class="search-input-topbar" id="searchInput" placeholder="Search files...">
            </div>
            <button class="icon-btn" title="Notifications">🔔</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content-area">

        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-icon green">📂</div>
                <div>
                    <div class="stat-label">Total Folders</div>
                    <div class="stat-value" id="statFolders">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">📄</div>
                <div>
                    <div class="stat-label">Total PDFs</div>
                    <div class="stat-value" id="statPdfs">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">📅</div>
                <div>
                    <div class="stat-label">Semesters</div>
                    <div class="stat-value" id="statSems">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">💾</div>
                <div>
                    <div class="stat-label">Total Size</div>
                    <div class="stat-value" id="statSize">—</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="toolbar-title" id="folderTitle">All Files</span>
                <span class="item-count" id="itemCount">0 items</span>
            </div>
            <div class="toolbar-right">
                <div class="view-toggle">
                    <button class="view-btn active" id="listViewBtn" title="List view">☰</button>
                    <button class="view-btn" id="gridViewBtn" title="Grid view">⊞</button>
                </div>
                <select class="sort-select" id="sortSelect">
                    <option value="name">Sort: Name</option>
                    <option value="date">Sort: Date</option>
                    <option value="type">Sort: Type</option>
                </select>
            </div>
        </div>

        <!-- File table header (list view) -->
        <div class="file-table-header" id="tableHeader">
            <span>Name</span>
            <span>Size</span>
            <span>Modified</span>
            <span>Actions</span>
        </div>

        <!-- Items container -->
        <div id="content">
            <div class="loader" id="loader">
                <div class="spin"></div>
                <span>Loading...</span>
            </div>
        </div>

    </div>
</main>

<!-- ── PDF VIEWER ──────────────────────────────────────── -->
<div class="pdf-overlay" id="pdfOverlay">
    <div class="pdf-topbar">
        <button class="back-btn" id="closePdfBtn">←</button>
        <div class="pdf-title-bar">
            <div class="pdf-file-name" id="pdfTitle">Document</div>
            <div class="pdf-file-sub" id="pdfSubtitle">PDF Document</div>
        </div>
        <button class="pdf-download-btn" id="pdfDownloadBtn">
            ⬇ Download
        </button>
    </div>
    <div class="pdf-frame-container">
        <iframe class="pdf-iframe" id="pdfIframe" src=""></iframe>
    </div>
</div>

<!-- ── MOBILE BOTTOM NAV ─────────────────────────────── -->
<div class="mobile-bottom-nav">
    <button class="mobile-nav-item active" onclick="navigateHome()">
        <span class="mobile-nav-icon">🏠</span> Home
    </button>
    <button class="mobile-nav-item">
        <span class="mobile-nav-icon">🔍</span> Search
    </button>
    <button class="mobile-nav-item">
        <span class="mobile-nav-icon">⭐</span> Starred
    </button>
    <button class="mobile-nav-item">
        <span class="mobile-nav-icon">📁</span> Files
    </button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
